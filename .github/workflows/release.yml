name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_BODY: |
    ## 下载建议

    - Windows 常规安装：下载 `Douyin.Downloader_*_x64-setup.exe`
    - Windows 便携版：下载 `Douyin-Downloader_*_x64_portable.zip`，解压后运行里面的 exe
    - macOS Apple Silicon：下载 `Douyin.Downloader_*_aarch64.dmg` 或 `*_macos-arm64_portable.zip`
    - macOS Intel：下载 `Douyin.Downloader_*_x64.dmg` 或 `*_macos-x64_portable.zip`
    - Linux Debian/Ubuntu：下载 `Douyin.Downloader_*_amd64.deb`
    - Linux Fedora/openSUSE/RHEL：下载 `Douyin.Downloader-*-1.x86_64.rpm`
    - Linux 通用便携：下载 `Douyin.Downloader_*_amd64.AppImage`

    `.sig` 和 `latest.json` / `windows.json` / `darwin.json` / `linux.json` 主要用于自动更新和签名校验，普通安装通常不需要手动下载。

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            label: macos-arm64
          - target: x86_64-apple-darwin
            label: macos-x64
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: cargo tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'Douyin Downloader ${{ github.ref_name }}'
          releaseBody: ${{ env.RELEASE_BODY }}
          releaseDraft: false
          prerelease: false
          retryAttempts: 5
          args: --target ${{ matrix.target }} -b app -b dmg

      - name: Package portable macOS zip
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          APP_PATH="$(find "$APP_DIR" -maxdepth 1 -name "*.app" -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "Could not find built .app bundle"
            find "src-tauri/target" -maxdepth 6 -name "*.app" -print || true
            exit 1
          fi
          DEST="Douyin-Downloader_${VERSION}_${{ matrix.label }}_portable.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$DEST"
          echo "Created: $DEST"

      - name: Upload portable macOS zip to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          files: Douyin-Downloader_*_${{ matrix.label }}_portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows-installer:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app (NSIS installer)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: cargo tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'Douyin Downloader ${{ github.ref_name }}'
          releaseBody: ${{ env.RELEASE_BODY }}
          releaseDraft: false
          prerelease: false
          retryAttempts: 5
          args: --target x86_64-pc-windows-msvc -b nsis

  build-windows-portable:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2"

      - name: Build portable exe
        run: cargo tauri build --target x86_64-pc-windows-msvc --no-bundle

      - name: Package portable exe
        shell: pwsh
        run: |
          $candidates = @(
            "src-tauri\target\x86_64-pc-windows-msvc\release",
            "src-tauri\target\release"
          ) | Where-Object { Test-Path $_ }

          $exePath = $null
          foreach ($dir in $candidates) {
            $match = Get-ChildItem -Path $dir -Filter "*.exe" -File |
              Where-Object { $_.Name -notmatch "setup|installer|uninstall" } |
              Select-Object -First 1
            if ($match) {
              $exePath = $match.FullName
              break
            }
          }

          if (-not $exePath) {
            Write-Error "Could not find built portable exe"
            Get-ChildItem -Path "src-tauri\target" -Recurse -Filter "*.exe" | ForEach-Object { Write-Output $_.FullName }
            exit 1
          }

          $version = "${{ github.ref_name }}" -replace '^v',''
          $dest = "Douyin-Downloader_${version}_x64_portable.exe"
          Copy-Item $exePath $dest
          Write-Output "Created: $dest"

          $readme = @"
          Douyin Downloader Windows portable
          =================================

          解压后双击 $dest 即可启动。

          如果程序没有窗口或无法启动，请先安装 Microsoft Edge WebView2 Runtime：
          https://developer.microsoft.com/microsoft-edge/webview2/
          "@
          $readme | Set-Content -Path "README-Windows-Portable.txt" -Encoding UTF8
          Compress-Archive -Path $dest, "README-Windows-Portable.txt" -DestinationPath "Douyin-Downloader_${version}_x64_portable.zip" -Force
          Write-Output "Created: Douyin-Downloader_${version}_x64_portable.zip"

      - name: Sign portable assets
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $portable = Get-ChildItem -Path . -Filter "Douyin-Downloader_*_x64_portable.exe" -File | Select-Object -First 1
          if (-not $portable) {
            Write-Error "Could not find portable exe to sign"
            exit 1
          }
          cargo tauri signer sign $portable.FullName

          $portableZip = Get-ChildItem -Path . -Filter "Douyin-Downloader_*_x64_portable.zip" -File | Select-Object -First 1
          if (-not $portableZip) {
            Write-Error "Could not find portable zip to sign"
            exit 1
          }
          cargo tauri signer sign $portableZip.FullName

      - name: Upload portable assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          files: |
            Douyin-Downloader_*_x64_portable.exe
            Douyin-Downloader_*_x64_portable.exe.sig
            Douyin-Downloader_*_x64_portable.zip
            Douyin-Downloader_*_x64_portable.zip.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: cargo tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'Douyin Downloader ${{ github.ref_name }}'
          releaseBody: ${{ env.RELEASE_BODY }}
          releaseDraft: false
          prerelease: false
          retryAttempts: 5
          args: --target x86_64-unknown-linux-gnu -b deb -b rpm -b appimage

  finalize-updater:
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows-installer
      - build-windows-portable
      - build-linux
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify and publish updater metadata aliases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          gh release download "$VERSION" \
            --repo "${{ github.repository }}" \
            --pattern latest.json \
            --output latest.json

          gh release download "$VERSION" \
            --repo "${{ github.repository }}" \
            --pattern '*.sig'
          node scripts/finalize-updater-metadata.mjs

          gh release upload "$VERSION" latest.json darwin.json windows.json linux.json \
            --repo "${{ github.repository }}" \
            --clobber
